<!DOCTYPE html>
<html>

<head>
    <title>INSTRUCT'IF - Mon Profil</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/global.css">
    <script src="components/header.js" type="text/javascript" defer></script>

    <style>
        main {
            text-align: left;
        }

        .top-actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn-outline {
            background-color: #ebf4ff;
            color: #1d63ed;
            border: 1px solid #1d63ed;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }

        .btn-outline:hover {
            background-color: #dbeafe;
        }

        .bandeau {
            background-color: #f7fafc;
            border-radius: 16px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .avatar {
            width: 72px;
            height: 72px;
            background-color: #d1fae5;
            color: #047857;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
        }

        .info-user p {
            color: #718096;
            margin: 0;
        }

        .badge {
            background-color: #ecfdf3;
            color: #047857;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: bold;
        }

        h2 {
            text-align: left;
            margin-top: 30px;
        }

        .card {
            border: 1px solid #edf2f7;
            border-radius: 16px;
            padding: 0 20px;
        }

        .card-row {
            display: flex;
            justify-content: space-between;
            padding-block: 16px;
            border-bottom: 1px solid #edf2f7;
        }

        .card-row:last-child {
            border-bottom: none;
        }

        .card-value {
            font-weight: bold;
        }

        .text-blue {
            color: #1d63ed;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-top: 12px;
        }

        .stat-card {
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 14px 16px;
            background-color: #ffffff;
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #718096;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 800;
            color: #1a202c;
        }

        .soutiens-list {
            display: grid;
            gap: 14px;
        }

        .soutien-item {
            border: 1px solid #edf2f7;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-color: #ffffff;
        }

        .soutien-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .soutien-title {
            font-weight: 700;
            color: #1a202c;
        }

        .soutien-meta {
            color: #718096;
            font-size: 14px;
        }

        .soutien-link {
            color: #1d63ed;
            text-decoration: none;
            font-weight: 600;
            word-break: break-all;
        }

        .empty-state {
            padding: 16px;
            border-radius: 16px;
            border: 1px dashed #e2e8f0;
            color: #718096;
        }
        .btn-teal {
            background-color: #2a9d8f;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }

        .btn-teal:hover {
            background-color: #21867a;
        }

    </style>
</head>

<body>
    <header-component></header-component>

    <main>
        <div class="top-actions">
            <a href='./historique.html' class="btn-outline">Historique</a>

            <a href='./statistique.html' class="btn-teal">Statistiques</a>

        </div>
        <div class="bandeau">
            <div class="avatar" id="ui_initiales">--</div>
            <div class="info-user">
                <h1 id="ui_nom_complet">Chargement...</h1>
                <p id="ui_sous_titre">--</p>
                <span class="badge">Intervenant</span>
            </div>
        </div>

        <h2>Informations personnelles</h2>
        <div class="card">
            <div class="card-row">
                <span>Nom</span>
                <span class="card-value" id="ui_nom">--</span>
            </div>
            <div class="card-row">
                <span>Prénom</span>
                <span class="card-value" id="ui_prenom">--</span>
            </div>
            <div class="card-row">
                <span>Adresse e-mail</span>
                <span class="card-value text-blue" id="ui_email">--</span>
            </div>
            <div class="card-row">
                <span>Login</span>
                <span class="card-value" id="ui_login">--</span>
            </div>
        </div>

        <h2>Récapitulatif d'activité</h2>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Interventions</div>
                <div class="stat-value" id="ui_stat_interventions">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Durée moy.</div>
                <div class="stat-value" id="ui_stat_duree">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Élèves aidés</div>
                <div class="stat-value" id="ui_stat_eleves">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Établissements</div>
                <div class="stat-value" id="ui_stat_etabs">--</div>
            </div>
        </div>

        <h2>Soutiens en cours</h2>
        <div class="soutiens-list" id="ui_soutiens_list"></div>
        <div class="empty-state" id="ui_soutiens_empty" style="display: none;">Aucun soutien en cours pour le moment.
        </div>
    </main>

    <script>
        function buildSubtitle(res) {
            if (!res || !res.typeIntervenant) {
                return "Intervenant";
            }

            if (res.typeIntervenant === "etudiant") {
                const parts = [];
                if (res.specialite) {
                    parts.push(res.specialite);
                }
                if (res.universite) {
                    parts.push(res.universite);
                }
                return parts.length ? parts.join(" · ") : "Intervenant étudiant";
            }

            if (res.typeIntervenant === "enseignant") {
                return res.typeEtablissement ? `Enseignant · ${res.typeEtablissement}` : "Enseignant";
            }

            if (res.typeIntervenant === "autre") {
                return res.activite ? res.activite : "Intervenant";
            }

            return "Intervenant";
        }

        function formatDate(dateString) {
            if (!dateString) {
                return "";
            }
            const parsed = new Date(dateString);
            if (Number.isNaN(parsed.getTime())) {
                return dateString;
            }
            return parsed.toLocaleDateString("fr-FR", {
                day: "2-digit",
                month: "2-digit",
                year: "numeric"
            });
        }

        function renderSoutiens(soutiens) {
            const list = document.getElementById("ui_soutiens_list");
            const empty = document.getElementById("ui_soutiens_empty");
            list.innerHTML = "";

            if (!soutiens || soutiens.length === 0) {
                empty.style.display = "block";
                return;
            }

            empty.style.display = "none";
            soutiens.forEach((soutien) => {
                const item = document.createElement("div");
                item.className = "soutien-item";

                const theme = soutien.theme;
                const eleve = `${soutien.elevePrenom} ${soutien.eleveNom}`.trim();
                const date = formatDate(soutien.date);

                // Utilisation d'un ID unique basé sur l'ID du soutien pour le textarea et le bouton
                item.innerHTML = `
                        <div class="soutien-header">
                            <div>
                                <div class="soutien-title">${theme}</div>
                                <div class="soutien-meta">${eleve ? "Élève : " + eleve : "Élève non renseigné"}</div>
                            </div>
                            <div class="soutien-meta">${date}</div>
                        </div>
                        <div class="soutien-meta">${soutien.description || "Description non renseignée"}</div>
                        <a class="soutien-link" href="${soutien.lienVisio}" target="_blank">Lien visio</a>
                        
                        <div class="finir_soutien">
                            <div class="field-group">
                                <label>Commentaires de fin de visio</label>
                                <textarea id="description-${soutien.id}" rows="4" cols="50" placeholder='Commentaires...'></textarea>
                                <button class="btn-primary" id="btn-${soutien.id}">Marquer comme fini</button>
                            </div>
                        </div>
                    `;

                list.appendChild(item);

                // Attachement de l'écouteur d'événement directement sur le bouton créé
                const btn = item.querySelector(`#btn-${soutien.id}`);
                if (btn) {
                    btn.addEventListener("click", () => finirSoutien(soutien.id));
                }
            });
        }

        async function initPage() {
            try {
                const res = await fetch('http://localhost:8080/mavenproject/ActionServlet?todo=get_intervenant_from_id')
                    .then(r => r.json());

                if (res && res.succes) {
                    document.getElementById('ui_initiales').innerText = res.prenom.charAt(0) + res.nom.charAt(0);
                    document.getElementById('ui_nom_complet').innerText = res.prenom + ' ' + res.nom;
                    document.getElementById('ui_sous_titre').innerText = buildSubtitle(res);

                    document.getElementById('ui_nom').innerText = res.nom;
                    document.getElementById('ui_prenom').innerText = res.prenom;
                    document.getElementById('ui_email').innerText = res.adresseMail;
                    document.getElementById('ui_login').innerText = res.login;

                    document.getElementById('ui_stat_interventions').innerText = res.nbSoutiens ?? 0;

                    const avgMinutes = Math.round(res.avgDuree ?? 0);
                    document.getElementById('ui_stat_duree').innerText = `${avgMinutes} min`;
                    document.getElementById('ui_stat_eleves').innerText = res.nbEleves ?? 0;
                    document.getElementById('ui_stat_etabs').innerText = res.nbEtablissements ?? 0;

                    renderSoutiens(res.soutiens);
                }
            } catch (error) {
                console.error("Erreur lors de la récupération des données", error);
            }
        }

        async function finirSoutien(soutienId) {
            const errorBox = document.getElementById("error-box");

            // Récupération dynamique du textarea correspondant au soutien cliqué
            const textarea = document.getElementById(`description-${soutienId}`);
            const commentaire = textarea ? textarea.value : "";

            const params = new URLSearchParams({
                soutien_id: soutienId,
                soutien_commentaire: commentaire
            });

            try {
                let res = await fetch('http://localhost:8080/mavenproject/ActionServlet?todo=finir_soutien', {
                    method: "POST",
                    body: params
                }).then(r => r.json());

                if (res?.succes) {
                    if (errorBox) errorBox.style.display = "none";
                    initPage();
                } else {
                    if (errorBox) errorBox.style.display = "block";
                }
            } catch (error) {
                console.error("Erreur lors de la clôture du soutien", error);
                if (errorBox) errorBox.style.display = "block";
            }
        }

        window.onload = initPage;
    </script>
</body>

</html>
