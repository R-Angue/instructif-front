<html>
    <head>
        <title>INSTRUCT'IF</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="components/header.js" type="text/javascript" defer></script>
        <link rel="stylesheet" href="styles/global.css">

        <style>
            body {
                background-color: #fafafa;
            }

            .top-section{
                background : linear-gradient(135deg, #0d52d6 0%, #199e7d 100%);
                color: #ffffff;
                padding: 40px 24px 35px 24px;
                text-align: center;
            }

            .title {
                font-size: 2.2rem;
                margin-bottom: 12px
                
                
            }
            .subtitle{
                font-size : 0.95rem;
                line-height : 1.5;
                margin-bottom : 30px
            }
            
            .subjects-box {
                display : flex;
                flex-wrap: wrap;
                gap : 8px;
                justify-content: center;
                padding-bottom: 20px
            }
            
            .subject{
                background-color: rgba(255,255,255,0.15);
                border: 1px solid rgba(255,255,255,0.30);
                border-radius: 20px;
                padding: 8px 16px;
                font-size: 0.85rem;
            }
            
            .bottom-section{
                background-color: #fafafa;
                padding : 30px 20px
            }
            
            .section-title{
                text-transform: uppercase;
                letter-spacing: 1px;
                color: #9ca3b1;
                margin-bottom: 16px
            }
            
            .step-grid{
                display: grid;
                grid-template-columns: repeat(3,1fr);
                gap: 20px;
                margin-bottom : 24px;
                padding: 10px 100px
            }
            
            .steps-card {
                background-color : #ffffff;
                border: 2px solid #e7e9ed;
                border-radius : 14px;
                padding : 16px 8px;
                text-align: center;
                
            }
            
            .icon {
                width: 36px;
                height : 36px;
                border-radius: 8px;
                margin : 0 auto 12px auto;
                align-items: center;
            }
            
            .bg-blue { background-color: #eff6fe;}
            .bg-green { background-color: #f1fdfa;}
            .bg-yellow { background-color: #fffbec;}
            
            h3 {
                font-size : 0.8rem;
                margin-bottom : 4px;
                line-height: 1.3;
            }
            
            p {
                font-size : 0.7rem;
                line-height: 1.3;
                color: #94a3b8
            }
        </style>
    </head>
    <body>
    <header-component></header-component>
    
    <div style="padding-top: 60px;">
    
        <div class="top-section"> 
            <h1 class="title">INSTRUCT'IF</h1>
            <p class="subtitle">Le réseau d'aide aux devoirs<br>pour les collégiens</p>

            <div class="subjects-box">
                <div class="subject">📕 Histoire-Geo</div>
                <div class="subject">🔢 Mathématiques</div>
                <div class="subject">✏️ Français</div>
                <div class="subject">🌍 Et plus...</div>
            </div>
        </div>
        <div class ="bottom-section">
            <h2 class="section-title">Comment ça marche ?</h2>
            <div class="step-grid">
                <div class = "steps-card">
                    <div class ="icon bg-blue">📄</div>
                    <h3>Je demande</h3>
                    <p>Décris ta question</p>
                </div>
                <div class = "steps-card">
                    <div class ="icon bg-green">🎓</div>
                    <h3>Un expert répond</h3>
                    <p>En visio, en direct</p>
                </div>
                <div class = "steps-card">
                    <div class ="icon bg-yellow">⭐</div>
                    <h3>Je progresse</h3>
                    <p>Bilan envoyé par mail</p>
                </div>
            </div>

        </div>

    </div>

</body>
</html>
