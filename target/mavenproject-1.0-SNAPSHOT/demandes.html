<!DOCTYPE html>
<html>
    <head>
        <title>Demandes</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h1>Demandes</h1>
        <button id="bouton-lister-demandes">Lister les demandes</button>
        <h2>Liste des demandes</h2>
        <ul id="liste-demandes">
        </ul>
        <script>
            function initPage() {
                console.log("Initialisation de la page");
                document.getElementById('bouton-lister-demandes').addEventListener('click', function () {
                    console.log("Click sur le bouton 'Lister demandes'");
                    listerDemandes();
                });
            }
            ;

            async function listerDemandes() {
                console.log("Appel de l'Action: Consulter liste demandes");
                let url = 'http://localhost:8080/mavenproject/ActionServlet?todo=consulter-liste-demandes';
                let jsonResponse = await fetch(url)
                        .then(
                                function (httpResponse) {
                                    return httpResponse.json();
                                }
                        )
                        .catch(
                                function (error) {
                                    console.log(error);
                                    return null;
                                }
                        );
                console.log(jsonResponse);
                if (jsonResponse) {
                    console.log('Affichage de la liste de demandes');

                    let demandes = jsonResponse.listedemandes;

                    let listeElement = document.getElementById("liste-demandes");
                    //let listeElement = zoneListe.querySelector('[data-property=liste-demandes]');
                    //let template = zoneListe.querySelector('[data-template=demande]');

                    for (const d of demandes) {
                        let element = document.createElement("li");
                        element.appendChild(document.createTextNode("id = " + d.id));
                        element.appendChild(document.createTextNode("; dateCreation = " + d.dateCreation));
                        element.appendChild(document.createTextNode("; description = " + d.description));

                        listeElement.appendChild(element);
                    }

                }
            }
            window.onload = initPage;
        </script>
    </body>
</html>
