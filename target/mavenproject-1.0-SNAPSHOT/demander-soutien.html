<html>

<head>
    <title>Demande de soutien</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="components/header.js" type="text/javascript" defer></script>
    <link rel="stylesheet" href="styles/global.css">
</head>

<body>
    <header-component></header-component>
    <main>
        <h1>Demander de l'aide</h1>
        <p>Un intervenant sera disponible immédiatement</p>
        <div class="field-group">
            <label>Matière</label>
            <select id='matiereDropdown'>
                <option value="" disabled selected>Choisir...</option>
            </select>
        </div>

        <div class="field-group">
            <label>Thème</label>
            <select id='themeDropdown'>
                <option value="" disabled selected>Choisir...</option>
            </select>
        </div>

        <div class="field-group">
            <label>Décris ton problème</label>
            <textarea id="description" rows="4" cols="50" placeholder='Problème...'></textarea>
        </div>

        <button id="valider" class="btn-primary">Valider la demande</button>

        <div id="visio-box" class="result-box visio-box">
            <div class="box-title">LIEN VISIO GÉNÉRÉ</div>
            <a href="#" id="visio-link" target="_blank"></a>
        </div>

        <div id="intervenant-box" class="result-box intervenant-box">
            <div class="intervenant-box-content">
                <div class="avatar" id="intervenant-avatar"></div>
                <div class="intervenant-info">
                    <div class="box-title">Intervenant assigné</div>
                    <div class="intervenant-name" id="intervenant-name"></div>
                </div>
            </div>
        </div>

        <div id="error-box" class="result-box error-box">
            ⚠ Erreur dans la création de la demande
        </div>
    </main>

</body>

<script>
    var matieres;
    var matiereDropdown = document.getElementById('matiereDropdown');
    var themeDropdown = document.getElementById('themeDropdown');

    async function initPage() {
        document.getElementById('valider').addEventListener('click', validerDemande);
        document.getElementById('matiereDropdown').addEventListener('change', updateThemeDropdown);

        let res = await fetch('http://localhost:8080/mavenproject/ActionServlet?todo=get_matiere').then(r => r.json()).catch(() => null);
        let matieresJSON = JSON.stringify(res);
        matieres = JSON.parse(matieresJSON);

        Object.keys(matieres).forEach((matiere) => {
            var opt = document.createElement('option');
            opt.value = matiere;
            opt.innerHTML = matiere;
            matiereDropdown.appendChild(opt);
        });
    }

    async function updateThemeDropdown() {
        let matiereActuelle = matiereDropdown.value;

        var i, L = themeDropdown.options.length - 1;
        for (i = L; i > 0; i--) {
            themeDropdown.remove(i);
        }

        matieres[matiereActuelle].forEach((theme) => {
            var opt = document.createElement('option');
            opt.value = theme["id"];
            opt.innerHTML = theme["nom"];
            themeDropdown.appendChild(opt);
        });

        themeDropdown.value = "";
    }

    async function validerDemande() {
        const errorBox = document.getElementById("error-box");
        const visioBox = document.getElementById("visio-box");
        const intervenantBox = document.getElementById("intervenant-box");

        const params = new URLSearchParams({
            demande_theme: document.getElementById("themeDropdown").value,
            demande_commentaire: document.getElementById("description").value
        });



        let res = await fetch('http://localhost:8080/mavenproject/ActionServlet?todo=valider_demande', {
            method: "POST",
            body: params
        }).then(r => r.json()).catch(() => null);

        if (res?.succes) {
            errorBox.style.display = "none";

            document.getElementById("visio-link").href = res.url_visio;
            document.getElementById("visio-link").innerText = res.url_visio;

            let prenom = res.prenom_intervenant || "";
            let nom = res.nom_intervenant || "";
            let initiales = (prenom.charAt(0) + nom.charAt(0)).toUpperCase();

            document.getElementById("intervenant-avatar").innerText = initiales;
            document.getElementById("intervenant-name").innerText = `${prenom} ${nom}`;

            visioBox.style.display = "block";
            intervenantBox.style.display = "block";

        } else {
            visioBox.style.display = "none";
            intervenantBox.style.display = "none";
            errorBox.style.display = "block";
        }
    }

    window.onload = initPage;
</script>

</html>
