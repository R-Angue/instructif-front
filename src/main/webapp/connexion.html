<html>
    <head>
        <title>INSTRUCT'IF</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h1>Bon Retour</h1>

        <p>
            Email : <br>
            <input id="login_email" required>
        </p>

        <p>
            Mot de passe : <br>
            <input type="password" id="login_mdp" required>
        </p>

        <button id="connexion">Se connecter></button>

        <script>
            async function initPage() {
                console.log("Initialisation de la page");
                document.getElementById('connexion').addEventListener('click', function () {
                    console.log("Click sur le bouton 'Connexion'");
                    connexion();
                });

                let url = 'http://localhost:8080/mavenproject/ActionServlet?todo=check_connexion';
                let jsonResponse = await fetch(url)
                        .then(
                                function (httpResponse) {
                                    return httpResponse.json();
                                }
                        )
                        .catch(
                                function (error) {
                                    console.log(error);
                                    return null;
                                }
                        );
                console.log(jsonResponse);
                if (jsonResponse) {
                    if (jsonResponse.succes) {
                        window.location = "./profil_eleve.html";
                    }
                }
            }
            ;
            async function connexion() {
                let url = 'http://localhost:8080/mavenproject/ActionServlet?todo=connexion';
                let params = {
                    login_email: document.getElementById("login_email").value,
                    login_mdp: document.getElementById("login_mdp").value
                };

                let jsonResponse = await fetch(url, {
                    method: "POST",
                    body:
                            new URLSearchParams(params)
                })
                        .then((httpResponse) => {
                            if (!httpResponse.ok) {
                                throw "HTTP Error " + httpResponse.status;
                            }
                            return httpResponse.json();
                        })
                        .catch((error) => {
                            console.log("[ AJAX ERROR ]", error);
                            return null;
                        });
                if (jsonResponse) {
                    if (jsonResponse.succes) {
                        window.location = "./profil_eleve.html";
                    }
                }
            }
            window.onload = initPage;
        </script>
    </body>
</html>
