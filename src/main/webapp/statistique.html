<html>
    <head>
        <title>TODO supply a title</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles/global.css">
        <script src="components/header.js" type="text/javascript" defer></script>

        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

        <style>
            .map-card {
                padding: 40px;
            }

            #map {
                width: 100%;
                height: 500px;
            }

        </style>
    </head>
    <body>
    <header-component></header-component>
    <div class="card map-card">
        <div id="map"></div>
    </div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</body>

<script>
    async function initMap() {

        const map = L.map('map').setView([45.7640, 4.8357], 12);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);
        const res = await fetch(
                'http://localhost:8080/mavenproject/ActionServlet?todo=get_liste_etablissement'
                );
        const data = await res.json();
        const listeEtablissement = data.listeEtablissement;
        listeEtablissement.forEach(p => {
            L.marker([p.latitude, p.longitude])
                    .addTo(map)
                    .bindPopup(`
                    <div style="font-family: Arial;">
                        <strong>${p.nom}</strong><br><br>

                        <div style="font-size: 12px; color: #555;">
                            IPS | Étudiants | Durée moyenne
                        </div>

                        <div style="font-size: 14px;">
                            ${p.ips} | ${p.nb_soutien} | ${p.avg_duree}
                        </div>
                    </div>
            `);
        });
    }

    window.onload = initMap;
</script>
</html>
